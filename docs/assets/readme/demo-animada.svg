<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Demo Catalogo SaaS">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="95" fill="#e2e8f0" font-family="Segoe UI, Arial" font-size="28" font-weight="700">Catalogo SaaS</text>
  <text x="70" y="130" fill="#94a3b8" font-family="Segoe UI, Arial" font-size="20">Dashboard • Estoque • Login UX • Onboarding</text>

  <g filter="url(#shadow)">
    <rect x="70" y="170" width="1060" height="390" rx="24" fill="url(#card)"/>
  </g>

  <rect x="105" y="208" width="220" height="314" rx="14" fill="#e2e8f0"/>
  <rect x="350" y="208" width="745" height="66" rx="14" fill="#f8fafc"/>
  <rect x="350" y="292" width="230" height="105" rx="14" fill="#dbeafe"/>
  <rect x="597" y="292" width="230" height="105" rx="14" fill="#e0f2fe"/>
  <rect x="845" y="292" width="250" height="105" rx="14" fill="#dcfce7"/>

  <rect x="350" y="417" width="745" height="37" rx="10" fill="#e2e8f0"/>
  <rect x="350" y="468" width="745" height="37" rx="10" fill="#e2e8f0"/>

  <circle cx="1080" cy="241" r="11" fill="#2563eb">
    <animate attributeName="r" values="11;16;11" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <rect x="105" y="250" width="180" height="16" rx="8" fill="#cbd5e1"/>
  <rect x="105" y="280" width="160" height="16" rx="8" fill="#cbd5e1"/>
  <rect x="105" y="310" width="140" height="16" rx="8" fill="#cbd5e1"/>

  <text x="70" y="600" fill="#94a3b8" font-family="Segoe UI, Arial" font-size="15">Preview animado para README</text>
</svg>
