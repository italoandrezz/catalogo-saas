# Server
server.port=${SERVER_PORT:8080}

# PostgreSQL datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/catalogo_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# File upload
app.upload.dir=${APP_UPLOAD_DIR:/app/uploads}
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=16MB

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Auth hardening
auth.cookie.name=${AUTH_COOKIE_NAME:catalog_auth_token}
auth.cookie.secure=${AUTH_COOKIE_SECURE:false}
auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:Lax}
auth.login.max-attempts=${AUTH_LOGIN_MAX_ATTEMPTS:5}
auth.login.lock-duration-seconds=${AUTH_LOGIN_LOCK_DURATION_SECONDS:900}
auth.login.state-ttl-seconds=${AUTH_LOGIN_STATE_TTL_SECONDS:86400}
auth.login.max-tracked-keys=${AUTH_LOGIN_MAX_TRACKED_KEYS:20000}
auth.login.redis-enabled=${AUTH_LOGIN_REDIS_ENABLED:false}
auth.login.redis-key-prefix=${AUTH_LOGIN_REDIS_KEY_PREFIX:auth:rl:}
auth.code.expiration-minutes=${AUTH_CODE_EXPIRATION_MINUTES:10}

# Email
app.email.enabled=${APP_EMAIL_ENABLED:false}
app.email.from=${APP_EMAIL_FROM:no-reply@catalogo.local}

spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Security
app.security.trust-proxy-headers=${APP_SECURITY_TRUST_PROXY_HEADERS:false}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
